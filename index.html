</head>

<body>

<div class="card">

<h1>🏆 Daily Commitment Tracker</h1>

<input type="text" id="agent" placeholder="Agent Name">

<br>

<input type="number" id="commitment" placeholder="Commitment">

<br>

<input type="number" id="achievement" placeholder="EOD Achievement">

<br><br>

<button onclick="checkAchievement()">Check Result</button>

<div id="result"></div>

<img id="gif" src="dance.gif">

<audio id="song">
    <source src="victory.mp3" type="audio/mpeg">
</audio>

<table id="historyTable">
    <thead>
        <tr>
            <th>Date</th>
            <th>Agent</th>
            <th>Commitment</th>
            <th>Achievement</th>
            <th>%</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

</div>

<script>

loadHistory();

function checkAchievement(){

    let agent = document.getElementById("agent").value;
    let commitment = Number(document.getElementById("commitment").value);
    let achievement = Number(document.getElementById("achievement").value);

    if(!agent || commitment <= 0){
        alert("Please enter valid details");
        return;
    }

    let percentage = ((achievement / commitment) * 100).toFixed(0);

    saveHistory(agent, commitment, achievement, percentage);

    if(achievement >= commitment){

        document.getElementById("gif").style.display="block";

        document.getElementById("song").play();

        confetti({
            particleCount:300,
            spread:180
        });

        let message = "";

        if(percentage >= 150){
            message = "👑 Hall of Fame! " + percentage + "% Achieved";
        }
        else if(percentage >= 120){
            message = "🔥 Superstar! " + percentage + "% Achieved";
        }
        else{
            message = "🎉 Congratulations! " + percentage + "% Achieved";
        }

        document.getElementById("result").innerHTML =
        "<br>" + agent + "<br>" + message;

    }
    else{

        document.getElementById("gif").style.display="none";

        document.getElementById("result").innerHTML =
        "👍 Keep Going!<br>" +
        percentage + "% Achieved";
    }

    loadHistory();
}

function saveHistory(agent, commitment, achievement, percentage){

    let history =
    JSON.parse(localStorage.getItem("achievementHistory")) || [];

    history.push({
        date:new Date().toLocaleDateString(),
        agent,
        commitment,
        achievement,
        percentage
    });

    localStorage.setItem(
        "achievementHistory",
        JSON.stringify(history)
    );
}

function loadHistory(){

    let history =
    JSON.parse(localStorage.getItem("achievementHistory")) || [];

    let table =
    document.querySelector("#historyTable tbody");

    table.innerHTML="";

    history.forEach(item=>{

        table.innerHTML += `
        <tr>
            <td>${item.date}</td>
            <td>${item.agent}</td>
            <td>${item.commitment}</td>
            <td>${item.achievement}</td>
            <td>${item.percentage}%</td>
        </tr>`;
    });
}

</script>

</body>
</html>
