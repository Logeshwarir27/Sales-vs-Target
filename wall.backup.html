<!DOCTYPE html>
<html>
    
<head>
<title>Daily Achievement Wall</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:0;
    text-align:center;
}

.container{
    display:grid;
    grid-template-columns:repeat(3,280px);
    justify-content:center;
    gap:20px;
    padding-bottom:40px;
}

.card{
    background:white;
    width:280px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

.tag{
    font-size:18px;
    font-weight:bold;
    margin:10px 0;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    background:#b30000;
    color:white;
}

</style>

</head>

<body>

<div id="championBanner"></div>

<h1>
🏆 DAILY ACHIEVEMENT WALL | JUNE 2026 🏆
</h1>

<div class="container" id="cards"></div>

<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vT86iyMQe8vOD42IvzodWizQcMggjYD7PSP71n4MlcgcfwONLnlbn3AwDziRfKX097mHo3RP8PY1oCv/pub?output=csv";

fetch(csvUrl)
.then(response => response.text())
.then(csv => {

    const banner = document.getElementById("championBanner");
    const container = document.getElementById("cards");

    if(!banner || !container){
        throw new Error("championBanner or cards container not found");
    }

    const rows = csv.trim().split("\n");
    const data = [];

    for(let i = 1; i < rows.length; i++){

        const cols = rows[i].split(",");

        if(!cols[0]) continue;

        data.push({
            name: cols[0].trim(),
            commitment: Number(cols[1]) || 0,
            achievement: Number(cols[2]) || 0,
            percent: Number(cols[3]) || 0
        });
    }

    data.sort((a,b) => b.percent - a.percent);

    const achievers =
    data.filter(agent => agent.percent >= 100);

    if(achievers.length > 0){

    setTimeout(() => {

        const duration = 8000;
        const end = Date.now() + duration;

        (function frame() {

            confetti({
                particleCount: 5,
                angle: 60,
                spread: 70,
                origin: { x: 0 }
            });

            confetti({
                particleCount: 5,
                angle: 120,
                spread: 70,
                origin: { x: 1 }
            });

            if(Date.now() < end){
                requestAnimationFrame(frame);
            }

        })();

    }, 1000);

}

    if(achievers.length > 0){

        const champion = achievers[0];

        banner.innerHTML = `
        <div style="
            background:linear-gradient(135deg,#b30000,#ff1a1a);
            color:white;
            padding:40px;
            margin-bottom:40px;
            box-shadow:0 8px 25px rgba(0,0,0,.25);
        ">

            <div style="
                display:flex;
                align-items:center;
                justify-content:space-between;
                gap:30px;
            ">

                <div style="width:280px;text-align:center;">
                    <img
                        src="foodhub-logo.png"
                        style="
                            height:140px;
                            background:white;
                            padding:10px;
                            border-radius:12px;
                        "
                    >
                </div>

                <div style="flex:1;text-align:center;">

                    <div style="
                        font-size:30px;
                        font-weight:900;
                    ">
                        🏆 CHAMPION OF THE DAY 🏆
                    </div>

                    <div style="
                        font-size:60px;
                        font-weight:900;
                        margin:10px 0;
                    ">
                        ${champion.name}
                    </div>

                    <div style="
                        font-size:32px;
                        font-weight:700;
                    ">
                        ${champion.achievement} Achievements |
                        ${champion.percent}%
                    </div>

                </div>

                <div style="
                    width:420px;
                    background:white;
                    color:black;
                    padding:25px;
                    border-radius:15px;
                    text-align:center;
                ">

                    <div style="
                        font-size:52px;
                        font-weight:900;
                        color:#b30000;
                    ">
                        FOODHUB LIMITED
                    </div>

                    <div style="
                        font-size:40px;
                        font-weight:900;
                        margin-top:10px;
                    ">
                        APP ELITE TEAM
                    </div>

                </div>

            </div>

        </div>
        `;

    } else {

        banner.innerHTML = `
        <div style="
            background:linear-gradient(135deg,#b30000,#ff1a1a);
            color:white;
            padding:40px;
            margin-bottom:40px;
            box-shadow:0 8px 25px rgba(0,0,0,.25);
        ">

            <div style="
                display:flex;
                align-items:center;
                justify-content:space-between;
                gap:30px;
            ">

                <div style="width:280px;text-align:center;">
                    <img
                        src="foodhub-logo.png"
                        style="
                            height:140px;
                            background:white;
                            padding:10px;
                            border-radius:12px;
                        "
                    >
                </div>

                <div style="flex:1;text-align:center;">

                    <div style="
                        font-size:30px;
                        font-weight:900;
                    ">
                        👍 KEEP GOING TEAM
                    </div>

                    <div style="
                        font-size:55px;
                        font-weight:900;
                        margin:10px 0;
                    ">
                        No Champion Yet
                    </div>

                    <div style="
                        font-size:28px;
                        font-weight:700;
                    ">
                        Waiting for the first 100% achiever
                    </div>

                </div>

                <div style="
                    width:420px;
                    background:white;
                    color:black;
                    padding:25px;
                    border-radius:15px;
                    text-align:center;
                ">

                    <div style="
                        font-size:52px;
                        font-weight:900;
                        color:#b30000;
                    ">
                        FOODHUB LIMITED
                    </div>

                    <div style="
                        font-size:40px;
                        font-weight:900;
                        margin-top:10px;
                    ">
                        APP ELITE TEAM
                    </div>

                </div>

            </div>

        </div>
        `;
    }

    container.innerHTML = "";

    data.forEach((agent,index)=>{

        let tag = "👍 Keep Going";

        if(agent.percent >= 100){

            if(index === 0){
                tag = "🏆 Champion";
            }
            else if(index === 1){
                tag = "🥈 Runner Up";
            }
            else if(index === 2){
                tag = "🥉 Star Performer";
            }
            else{
                tag = "🎯 Target Achieved";
            }
        }

        container.innerHTML += `
        <div class="card">

            <h2>${agent.name}</h2>

            <p><b>Commitment:</b> ${agent.commitment}</p>

            <p><b>Achievement:</b> ${agent.achievement}</p>

            <h2>${agent.percent}%</h2>

            <div class="tag">${tag}</div>

${agent.percent >= 100 ? `
<img
src="champion.gif"
style="
width:100%;
border-radius:10px;
margin-top:10px;
">
` : ''}

            ${agent.percent >= 100 ? `
            <button onclick="celebrateAgent('${agent.name}',${agent.achievement},${agent.percent})">
                🎉 Celebrate
            </button>
            ` : ''}

        </div>
        `;
    });

});

function celebrateAgent(name,achievement,percent){

    localStorage.setItem("name",name);
    localStorage.setItem("achievement",achievement);
    localStorage.setItem("percent",percent);

    window.location.href = "celebrate.html";
}

</script>

</body>

</html>
