<!DOCTYPE html>
<html>
<head>
<title>Daily Achievement Wall</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
    text-align:center;
}

.banner{
    background:gold;
    padding:25px;
    border-radius:20px;
    margin-bottom:30px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

.banner h1{
    margin:0;
}

.banner .winner{
    font-size:40px;
    font-weight:bold;
    margin-top:10px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    background:white;
    width:280px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

.card h2{
    margin-top:0;
}

.tag{
    font-size:18px;
    font-weight:bold;
    margin:10px 0;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

</style>
</head>

<body>

<div id="championBanner"></div>

<h1>🏆 DAILY ACHIEVEMENT WALL 🏆</h1>

<div id="top3"></div>

<div class="container" id="cards"></div>
    
<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vT86iyMQe8vOD42IvzodWizQcMggjYD7PSP71n4MlcgcfwONLnlbn3AwDziRfKX097mHo3RP8PY1oCv/pub?output=csv";

fetch(csvUrl)
.then(response => response.text())
.then(csv => {
    console.log(csv);

    const rows = csv.trim().split("\n");

    const data = [];

    for(let i=1;i<rows.length;i++){

        const cols = rows[i].split(",");

        if(cols.length < 4) continue;

        data.push({
            name: cols[0].trim(),
            commitment: Number(cols[1]),
            achievement: Number(cols[2]),
            percent: Number(cols[3])
        });
    }

    data.sort((a,b)=>b.percent-a.percent);

    document.getElementById("top3").innerHTML = `
<div class="banner">
    <h1>🏆 TOP 3 PERFORMERS 🏆</h1>

    <div style="font-size:40px;margin:20px 0;">
        🥇 ${data[0]?.name || ""} - ${data[0].percent}%
    </div>

    <div style="font-size:32px;margin:15px 0;">
        🥈 ${data[0]?.name || ""} - ${data[1].percent}%
    </div>

    <div style="font-size:28px;margin:15px 0;">
        🥉 ${data[0]?.name || ""} - ${data[2].percent}%
    </div>
</div>
`;

    const container = document.getElementById("cards");

    data.forEach((agent,index)=>{

        let tag="👍 Keep Going";

        if(index===0){
            tag="🏆 Champion";
        }
        else if(index===1){
            tag="🥈 Runner Up";
        }
        else if(index===2){
            tag="🥉 Star Performer";
        }
        else if(agent.percent>=120){
            tag="🔥 Superstar";
        }
        else if(agent.percent>=100){
            tag="🎯 Target Achieved";
        }

        container.innerHTML += `
        <div class="card">

            <h2>${agent.name}</h2>

            <p><b>Commitment:</b> ${agent.commitment}</p>

            <p><b>Achievement:</b> ${agent.achievement}</p>

            <h2>${agent.percent}%</h2>

            <div class="tag">${tag}</div>

            ${index < 3 ? `
<button onclick="
    localStorage.setItem('name','${agent.name}');
    localStorage.setItem('achievement','${agent.achievement}');
    localStorage.setItem('percent','${agent.percent}');
    window.location.href='celebrate.html';
">
    🎉 Celebrate
</button>
` : ''}

        </div>
        `;
    });

})
.catch(error=>{
    document.body.innerHTML =
    '<h2>Unable to load Google Sheet data.</h2>';
});

</script>

</body>
</html>
