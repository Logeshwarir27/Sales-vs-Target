<!DOCTYPE html>
<html>
<head>
<title>Daily Achievement Wall</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
    text-align:center;
}

.banner{
    background:gold;
    padding:25px;
    border-radius:20px;
    margin-bottom:30px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
    max-width:1100px;
    margin-left:auto;
    margin-right:auto;
}

.banner h1{
    margin:0;
}

.banner .winner{
    font-size:48px;
    font-weight:bold;
    color:#b22222;
    margin-top:10px;
}

.container{
    display:grid;
    grid-template-columns:repeat(3, 280px);
    justify-content:center;
    gap:20px;
}

.card{
    background:white;
    width:280px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

.card h2{
    margin-top:0;
}

.tag{
    font-size:18px;
    font-weight:bold;
    margin:10px 0;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

</style>
</head>

<body>

<div id="championBanner"></div>

<h1 style="
font-size:52px;
font-weight:900;
color:#111;
margin-bottom:35px;
text-transform:uppercase;
letter-spacing:2px;
">
🏆 DAILY ACHIEVEMENT WALL 🏆
</h1>

<div class="container" id="cards"></div>
    
<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vT86iyMQe8vOD42IvzodWizQcMggjYD7PSP71n4MlcgcfwONLnlbn3AwDziRfKX097mHo3RP8PY1oCv/pub?output=csv";

fetch(csvUrl)
.then(response => response.text())
.then(csv => {

    const rows = csv.trim().split("\n");
    const data = [];

    for(let i=1;i<rows.length;i++){

        const cols = rows[i].split(",");

        if(cols.length < 4) continue;

        data.push({
            name: cols[0].trim(),
            commitment: Number(cols[1]),
            achievement: Number(cols[2]),
            percent: Number(cols[3])
        });
    }

    data.sort((a,b)=>b.percent-a.percent);

    const champion = data[0];

    document.getElementById("championBanner").innerHTML = `
<div style="
    background:linear-gradient(135deg,#b30000,#ff1a1a);
    color:white;
    padding:30px;
    border-radius:25px;
    max-width:1200px;
    margin:0 auto 40px auto;
    box-shadow:0 8px 25px rgba(0,0,0,.25);
">

    <div style="
        display:flex;
        align-items:center;
        justify-content:space-between;
        flex-wrap:wrap;
        gap:30px;
    ">

        <!-- Logo -->

        <div>
            <img
                src="foodhub-logo.png"
                style="
                    height:120px;
                    width:auto;
                    border-radius:12px;
                    background:white;
                    padding:10px;
                "
            >
        </div>

        <!-- Champion Section -->

        <div style="flex:1;text-align:center;">

            <div style="
                font-size:28px;
                font-weight:900;
                letter-spacing:2px;
                text-transform:uppercase;
            ">
                🏆 Champion of the Day 🏆
            </div>

            <div style="
                font-size:64px;
                font-weight:900;
                color:#ffffff;
                text-shadow:3px 3px 8px rgba(0,0,0,.3);
                margin:10px 0;
            ">
                ${champion.name}
            </div>

            <div style="
                font-size:30px;
                font-weight:700;
            ">
                ${champion.achievement} Achievements
                &nbsp;|&nbsp;
                ${champion.percent}%
            </div>

        </div>

        <!-- Team Name -->

        <div style="
            background:white;
            color:#111;
            padding:20px 30px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.15);
            text-align:center;
        ">

            <div style="
                font-size:34px;
                font-weight:900;
                color:#b30000;
                line-height:1.2;
            ">
                Foodhub Limited
            </div>

            <div style="
                font-size:32px;
                font-weight:800;
                margin-top:8px;
            ">
                App Elite Team
            </div>

        </div>

    </div>

</div>
`;

    const container = document.getElementById("cards");

data.forEach((agent,index)=>{

    let tag="👍 Keep Going";

    if(index===0){
        tag="🏆 Champion";
    }
    else if(index===1){
        tag="🥈 Runner Up";
    }
    else if(index===2){
        tag="🥉 Star Performer";
    }
    else if(agent.percent>=120){
        tag="🔥 Superstar";
    }
    else if(agent.percent>=100){
        tag="🎯 Target Achieved";
    }

    container.innerHTML += `
    <div class="card">

        <h2>${agent.name}</h2>

        <p><b>Commitment:</b> ${agent.commitment}</p>

        <p><b>Achievement:</b> ${agent.achievement}</p>

        <h2>${agent.percent}%</h2>

        <div class="tag">${tag}</div>

        ${index < 3 ? `
        <button onclick="
            localStorage.setItem('name','${agent.name}');
            localStorage.setItem('achievement','${agent.achievement}');
            localStorage.setItem('percent','${agent.percent}');
            window.location.href='celebrate.html';
        ">
            🎉 Celebrate
        </button>
        ` : ''}

    </div>
    `;
});

})
.catch(error=>{
    document.body.innerHTML =
    '<h2>Unable to load Google Sheet data.</h2>';
});
    });

})
.catch(error=>{
    document.body.innerHTML =
    '<h2>Unable to load Google Sheet data.</h2>';
});

</script>

</body>
</html>
