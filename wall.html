<!DOCTYPE html>
<html>
<head>
<title>Daily Achievement Wall</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
    text-align:center;
}

.banner{
    background:gold;
    padding:25px;
    border-radius:20px;
    margin-bottom:30px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

.banner h1{
    margin:0;
}

.banner .winner{
    font-size:40px;
    font-weight:bold;
    margin-top:10px;
}

.container{
    display:grid;
    grid-template-columns:repeat(3, 280px);
    justify-content:center;
    gap:20px;
}

.card{
    background:white;
    width:280px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

.card h2{
    margin-top:0;
}

.tag{
    font-size:18px;
    font-weight:bold;
    margin:10px 0;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

   .header{
    display:flex;
    flex-direction:row;
    align-items:center;
    justify-content:center;
    gap:25px;
    margin-bottom:20px;
}

.logo{
    height:120px;
    width:auto;
}

.header h1{
    margin:0;
}

.header h2{
    margin:5px 0 0 0;
    color:#555;
}

</style>
</head>

<body>

<div class="header">

    <img src="foodhub-logo.png" class="logo">

    <div class="title-section">
        <h1>Foodhub - APP ELITE Team</h1>
    </div>

</div>

<div id="championBanner"></div>

<h1>🏆 DAILY ACHIEVEMENT WALL 🏆</h1>

<div class="container" id="cards"></div>
    
<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vT86iyMQe8vOD42IvzodWizQcMggjYD7PSP71n4MlcgcfwONLnlbn3AwDziRfKX097mHo3RP8PY1oCv/pub?output=csv";

fetch(csvUrl)
.then(response => response.text())
.then(csv => {
    console.log(csv);

    const rows = csv.trim().split("\n");

    const data = [];

    for(let i=1;i<rows.length;i++){

        const cols = rows[i].split(",");

        if(cols.length < 4) continue;

        data.push({
            name: cols[0].trim(),
            commitment: Number(cols[1]),
            achievement: Number(cols[2]),
            percent: Number(cols[3])
        });
    }

    data.sort((a,b)=>b.percent-a.percent);

    const champion = data[0];

document.getElementById("championBanner").innerHTML = `
<div class="banner">

    <div style="
        display:flex;
        align-items:center;
        justify-content:center;
        gap:30px;
    ">

        <img
            src="foodhub-logo.png"
            style="
                height:120px;
                width:auto;
                border-radius:10px;
            "
        >

        <div>

            <h1>🏆 CHAMPION OF THE DAY 🏆</h1>

            <div class="winner">
                ${champion.name}
            </div>

            <h2>
                ${champion.achievement} Achievements |
                ${champion.percent}%
            </h2>

        </div>

    </div>

</div>
`;

    const container = document.getElementById("cards");

    data.forEach((agent,index)=>{

        let tag="👍 Keep Going";

        if(index===0){
            tag="🏆 Champion";
        }
        else if(index===1){
            tag="🥈 Runner Up";
        }
        else if(index===2){
            tag="🥉 Star Performer";
        }
        else if(agent.percent>=120){
            tag="🔥 Superstar";
        }
        else if(agent.percent>=100){
            tag="🎯 Target Achieved";
        }

        container.innerHTML += `
        <div class="card">

            <h2>${agent.name}</h2>

            <p><b>Commitment:</b> ${agent.commitment}</p>

            <p><b>Achievement:</b> ${agent.achievement}</p>

            <h2>${agent.percent}%</h2>

            <div class="tag">${tag}</div>

            ${index < 3 ? `
<button onclick="
    localStorage.setItem('name','${agent.name}');
    localStorage.setItem('achievement','${agent.achievement}');
    localStorage.setItem('percent','${agent.percent}');
    window.location.href='celebrate.html';
">
    🎉 Celebrate
</button>
` : ''}

        </div>
        `;
    });

})
.catch(error=>{
    document.body.innerHTML =
    '<h2>Unable to load Google Sheet data.</h2>';
});

</script>

</body>
</html>
